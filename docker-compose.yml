services:
  db:
    image: postgres:16-alpine
    container_name: hackaton-db
    environment:
      POSTGRES_DB: hackaton
      POSTGRES_USER: hackaton
      POSTGRES_PASSWORD: hackaton
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackaton -d hackaton"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    container_name: hackaton-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=hackaton;Username=hackaton;Password=hackaton"
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: ./src/Web
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: hackaton-web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db-data:
